<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- Meta / OG tags - 크롤러는 JS를 실행하지 않으므로 정적 HTML에 직접 박아둠 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="두민수와 이혜선 결혼합니다💍" />
    <meta
      property="og:description"
      content="2026년 8월 8일 오후 5시50분\n소중한 분들을 초대합니다."
    />
    <meta
      property="og:image"
      content="https://little-eden-0808.github.io/minsu-hyeseon/images/og/1.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:url"
      content="https://little-eden-0808.github.io/minsu-hyeseon/"
    />
    <meta
      name="description"
      content="2026년 8월 8일 오후 5시50분\n소중한 분들을 초대합니다."
    />

    <title>Wedding Invitation</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <!-- ─── Curtain (Simple Overlay) ─── -->
    <div id="curtain" class="curtain">
      <div class="curtain__content">
        <p class="curtain__names" id="curtainNames"></p>
        <button class="curtain__btn" id="curtainBtn">열기</button>
      </div>
    </div>

    <!-- ─── Toast Notification ─── -->
    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- ─── Photo Viewer Modal ─── -->
    <div
      id="photoModal"
      class="photo-modal"
      role="dialog"
      aria-modal="true"
      aria-label="사진 보기"
    >
      <button class="photo-modal__close" id="modalClose" aria-label="닫기">
        &times;
      </button>
      <button
        class="photo-modal__nav photo-modal__nav--prev"
        id="modalPrev"
        aria-label="이전 사진"
      >
        &#8249;
      </button>
      <button
        class="photo-modal__nav photo-modal__nav--next"
        id="modalNext"
        aria-label="다음 사진"
      >
        &#8250;
      </button>
      <div class="photo-modal__container" id="modalContainer">
        <img
          class="photo-modal__img"
          id="modalImg"
          src=""
          alt="사진"
          draggable="false"
        />
      </div>
      <div class="photo-modal__counter" id="modalCounter"></div>
    </div>

    <!-- ─── Main Content ─── -->
    <main id="mainContent" class="main-content">
      <!-- Hero Section -->
      <section class="section hero" id="hero">
        <div class="hero__photo-wrap">
          <img
            class="hero__photo"
            id="heroPhoto"
            src=""
            alt="웨딩 사진"
            loading="eager"
          />
        </div>
        <div class="hero__content">
          <h1
            class="hero__names animate-item"
            data-animate="fade-up"
            id="heroNames"
          ></h1>
          <p
            class="hero__date animate-item"
            data-animate="fade-up"
            id="heroDate"
          ></p>
          <p
            class="hero__venue animate-item"
            data-animate="fade-up"
            id="heroVenue"
          ></p>
        </div>

        <!-- Greeting Section -->
        <section class="section greeting" id="greeting">
          <div class="section__inner">
            <h2
              class="section__title animate-item"
              data-animate="fade-up"
              id="greetingTitle"
            ></h2>
            <div
              class="section__divider animate-item"
              data-animate="fade-in"
            ></div>
            <p
              class="greeting__text animate-item"
              data-animate="fade-up"
              id="greetingContent"
            ></p>
            <div
              class="greeting__parents animate-item"
              data-animate="fade-up"
              id="greetingParents"
            ></div>
          </div>
        </section>

        <!-- Story Section -->
        <!-- <section class="section story" id="story">
          <div class="section__inner">
            <h2
              class="section__title animate-item"
              data-animate="fade-up"
              id="storyTitle"
            ></h2>
            <div
              class="section__divider animate-item"
              data-animate="fade-in"
            ></div>
            <p
              class="story__text animate-item"
              data-animate="fade-up"
              id="storyContent"
            ></p>
            <div class="story__photos" id="storyPhotos"></div>
          </div>
        </section> -->

        <!-- Gallery Section -->
        <section class="section gallery" id="gallery">
          <div class="section__inner">
            <h2 class="section__title animate-item" data-animate="fade-up"></h2>
            <div
              class="section__divider animate-item"
              data-animate="fade-in"
            ></div>
            <div class="gallery__grid" id="galleryGrid"></div>
          </div>
        </section>

        <!-- Calendar Actions -->
        <section class="section calendar-section" id="calendarSection">
          <div class="section__inner">
            <!-- <h2 class="section__title animate-item" data-animate="fade-up">
              예식 일시
            </h2> -->
            <div
              class="section__divider animate-item"
              data-animate="fade-in"
            ></div>
          </div>
          <img
            class="calendar__image"
            src="images/calendar/1.jpg"
            alt="예식 일시"
          />
          <div class="section__inner">
            <div class="calendar-actions animate-item" data-animate="fade-up">
              <a
                class="btn btn--outline"
                id="googleCalBtn"
                href="#"
                target="_blank"
                rel="noopener"
                >Google 캘린더</a
              >
              <button class="btn btn--outline" id="icsDownloadBtn">
                Apple 캘린더
              </button>
            </div>
          </div>
        </section>

        <!-- Location Section -->
        <section class="section location" id="location">
          <div class="section__inner">
            <h2 class="section__title animate-item" data-animate="fade-up">
              오시는 길
            </h2>
            <div
              class="section__divider animate-item"
              data-animate="fade-in"
            ></div>
            <!-- <div class="location__info">
              <p class="location__venue" id="locationVenue"></p>
              <p class="location__hall" id="locationHall"></p>
              <p class="location__tel" id="locationTel"></p>
            </div> -->
            <div class="location__map" id="naverMap"></div>

            <!-- 주소 박스 -->
            <!-- <div class="address-box">
              <div class="address-box__text">
                <p class="address-box__addr" id="addressBoxAddr"></p>
                <p class="address-box__venue" id="addressBoxVenue"></p>
              </div>
              <button class="address-box__copy" id="copyAddressBtn">복사하기</button>
            </div> -->

            <!-- 지도 앱 링크 -->
            <div class="location__links">
              <a
                class="btn btn--outline"
                id="kakaoMapBtn"
                href="#"
                target="_blank"
                rel="noopener"
                >카카오맵</a
              >
              <a
                class="btn btn--outline"
                id="naverMapBtn"
                href="#"
                target="_blank"
                rel="noopener"
                >네이버지도</a
              >
            </div>

            <hr class="location__hr" />

            <!-- 교통 안내 -->
            <div class="transport" id="transportList"></div>
          </div>
        </section>
      </section>
      <!-- Account Section (축의금) -->
      <section class="section account" id="account">
        <div class="section__inner">
          <h2 class="section__title animate-item" data-animate="fade-up">
            마음 전하실 곳
          </h2>
          <div
            class="section__divider animate-item"
            data-animate="fade-in"
          ></div>
          <!-- <p class="account__desc animate-item" data-animate="fade-up">
            축하의 마음을 담아 축의금을 전달해 보세요.
          </p> -->

          <!-- Groom Accounts -->
          <div class="account-group">
            <h3 class="account-group__title">🤵🏻‍♂️ 신랑 측 계좌번호</h3>
            <ul class="account-list" id="groomAccountList"></ul>
          </div>

          <!-- Bride Accounts -->
          <div class="account-group">
            <h3 class="account-group__title">👰🏻‍♀️ 신부 측 계좌번호</h3>
            <ul class="account-list" id="brideAccountList"></ul>
          </div>
        </div>
      </section>
      <!-- Countdown -->
      <div class="countdown animate-item" data-animate="fade-up" id="countdown">
        <p class="countdown__label" id="countdownLabel"></p>
        <div class="countdown__timer">
          <div class="countdown__item">
            <span class="countdown__number" id="countDays">0</span>
            <span class="countdown__unit">일</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countHours">0</span>
            <span class="countdown__unit">시간</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countMinutes">0</span>
            <span class="countdown__unit">분</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countSeconds">0</span>
            <span class="countdown__unit">초</span>
          </div>
        </div>
      </div>
      <!-- Footer -->
      <footer class="footer">
        <p class="footer__text" id="footerText"></p>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
